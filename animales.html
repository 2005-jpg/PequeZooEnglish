<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animales en Inglés</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Comic+Neue:wght@400;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%); margin:0; }
        header { background:white; padding:1rem 5%; box-shadow:0 4px 15px rgba(0,0,0,0.1); display:flex; justify-content:space-between; align-items:center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; padding: 2rem 5%; }
        .card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 8px 25px rgba(0,0,0,0.1); text-align:center; }
        .card img { width:100%; height:160px; object-fit:cover; }
        .info { padding:1rem; }
        .speak-btn { background:#FF9800; color:white; border:none; padding:8px 16px; border-radius:30px; margin-top:8px; cursor:pointer; }
    </style>
</head>
<body>
    <header>
        <h2>🐱 Animales en Inglés</h2>
        <a href="index.html">🏠 Inicio</a>
    </header>

    <div class="grid" id="animalsGrid"></div>

    <script>
        const animals = [
            { name: "Dog", spanish: "Perro", emoji: "🐶", image: "perro.jpg" },
            { name: "Cat", spanish: "Gato", emoji: "🐱", image: "gato.jpg" },
            { name: "Lion", spanish: "León", emoji: "🦁", image: "leon.jpg" },
            { name: "Elephant", spanish: "Elefante", emoji: "🐘", image: "elefante.jpg" },
            { name: "Tiger", spanish: "tigre", emoji: "🐯", image: "tigre.jpg" },
            { name: "Monkey", spanish: "mono", emoji: "🐒", image: "mono.jpg" },
            { name: "Cow", spanish: "vaca", emoji: "🐮", image: "vaca.jpg" },
            { name: "Fish", spanish: "Pescado", emoji: "🐟", image: "pescado.jpg" },
            { name: "bird", spanish: "Pajaro", emoji: "🐦", image: "pajaro.jpg" },
            { name: "Pig", spanish: "Cerdo", emoji: "🐷", image: "cerdo.jpg" },
            { name: "Crow", spanish: "Cuervo", emoji: "(🐦‍⬛", image: "cuervo.jpg" },
            { name: "Horse", spanish: "Caballo", emoji: "🐎", image: "caballo.jpg" },
            { name: "Rabig", spanish: "Conejo", emoji: "🐇", image: "conejo.jpg" },

        ];

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            speechSynthesis.speak(utterance);
        }

        const grid = document.getElementById('animalsGrid');
        animals.forEach(animal => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${animal.image}" alt="${animal.name}">
                <div class="info">
                    <h3>${animal.emoji} ${animal.name}</h3>
                    <p>${animal.spanish}</p>
                    <button class="speak-btn" onclick="speak('${animal.name}')">🔊 Escuchar</button>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
