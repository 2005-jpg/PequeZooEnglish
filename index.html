<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 LearnFun - Inglés para Niños</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Comic+Neue:wght@400;700&display=swap');
        
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            margin: 0;
            min-height: 100vh;
        }
        
        header {
            background: white;
            padding: 2rem 5%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .logo { font-size: 3.5rem; margin-bottom: 0.5rem; }
        
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 5%;
        }
        
        .card {
            background: white;
            border-radius: 25px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            transition: 0.3s;
        }
        
        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .card h2 { font-size: 2.2rem; margin: 1rem 0; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🐾 LearnFun</div>
        <h1>¡Aprende Inglés Divertido!</h1>
    </header>

    <div class="menu">
        <a href="animales.html" class="card">🐱 <h2>Animales</h2></a>
        <a href="colores.html" class="card">🎨 <h2>Colores</h2></a>
        <a href="quiz.html" class="card">🎮 <h2>Quiz</h2></a>
    </div>
</body>
</html>
